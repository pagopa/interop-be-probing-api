
server.port=8087

#Scheduler
scheduler.bucketReader.daily-hours = 17
scheduler.bucketReader.daily-minutes = 30
scheduler.bucketReader.active = false
scheduler.bucketReader.retry-initial-interval = 60
scheduler.buckerReader.retry-interval-multiplier=1.5
spring.quartz.auto-startup = false

#Bucket
amazon.clientS3.accesskey = accesskey
amazon.clientS3.secretkey = secretkey
amazon.clientS3.region = us-east-1
amazon.bucketS3.name = bucket-name
amazon.bucketS3.key = bucket-key

amazon.sqs.end-point.services-queue=http://localhost:9324/queue/services
#SQS
amazon.sqs.region.static=us-east-1
amazon.sqs.credentials.accessKey=admin
amazon.sqs.credentials.secretKey=admin
spring.main.allow-bean-definition-overriding=true

#DB QUARTZ
spring.quartz.jdbc.initialize-schema=always
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.schema= classpath:tables_postgres.sql
#spring.quartz.properties.org.quartz.scheduler.skipUpdateCheck = true

#DB
spring.datasource.url= jdbc:postgresql://localhost:5432/interop-db
spring.datasource.username= postgres
spring.datasource.password= Test123
spring.datasource.driver-class-name= org.postgresql.Driver
spring.jpa.database-platform= org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database= POSTGRESQL
